<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HKCR - Physical Demand Analyser</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    /* ── Hong Kong China Rugby palette ── */
    --hk-red:#E8001D;
    --hk-red-dim:#a80015;
    --hk-red-bg:rgba(232,0,29,0.08);
    --hk-red-border:rgba(232,0,29,0.22);

    /* ── Surface / background ── */
    --bg:#0e0a0b;          /* near-black with red undertone */
    --surface:#180d0f;     /* cards / sidebar */
    --surface2:#211316;    /* hover / input bg */
    --surface3:#2a1a1d;    /* slightly lifted panels */

    /* ── Borders ── */
    --border:#2e1a1d;
    --border2:#3d2225;

    /* ── Text ── */
    --text:#f0e8e9;        /* warm white */
    --muted:#8a7275;       /* desaturated pink-grey */

    /* ── Data colours (unchanged — functional) ── */
    --green:#22c55e;--green-dim:#15803d;--green-bg:rgba(34,197,94,0.08);
    --red:#ef4444;--red-dim:#7f1d1d;--red-bg:rgba(239,68,68,0.08);
    --gold:#f59e0b;

    /* ── Accent → HK red ── */
    --accent:var(--hk-red);
    --accent-dim:var(--hk-red-bg);

    --font-head:'Barlow Condensed',sans-serif;
    --font-body:'Barlow',sans-serif;
    --font-mono:'DM Mono',monospace;
  }

  body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh}

  /* ══ HEADER ══════════════════════════════════════════════════════ */
  header{
    background:linear-gradient(135deg,#160609 0%,#1f0a0d 60%,#2a0c10 100%);
    border-bottom:2px solid var(--hk-red);
    padding:0 20px;
    display:flex;align-items:center;justify-content:space-between;
    height:58px;gap:16px;
    box-shadow:0 2px 20px rgba(232,0,29,0.18);
    position:relative;
  }
  /* subtle red glow line at very top */
  header::before{
    content:'';position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--hk-red) 30%,var(--hk-red) 70%,transparent);
    opacity:0.6;
  }

  /* ── Logo / crest area ── */
  .header-brand{display:flex;align-items:center;gap:12px;flex-shrink:0;text-decoration:none}
  .logo{font-family:var(--font-head);font-size:14px;font-weight:700;letter-spacing:0.06em;white-space:nowrap;line-height:1.15}
  .logo-top{color:var(--text);font-size:16px;font-weight:800;letter-spacing:0.08em;display:block}
  .logo-sub{color:var(--hk-red);font-size:10px;font-weight:600;letter-spacing:0.14em;display:block;text-transform:uppercase}
  .logo-divider{width:1px;height:30px;background:var(--border2);margin:0 4px}

  /* ── Nav ── */
  .nav{display:flex;gap:2px}
  .nav-btn{
    padding:6px 14px;border-radius:4px;font-size:12px;cursor:pointer;
    border:1px solid transparent;background:transparent;
    color:var(--muted);font-family:var(--font-mono);letter-spacing:0.04em;
    transition:all 0.15s;white-space:nowrap;
  }
  .nav-btn:hover{background:rgba(232,0,29,0.08);color:var(--text);border-color:var(--hk-red-border)}
  .nav-btn.active{
    background:var(--hk-red);
    border-color:var(--hk-red);
    color:#fff;
    font-weight:600;
    box-shadow:0 0 10px rgba(232,0,29,0.35);
  }

  /* ── Export button ── */
  .export-btn{
    background:transparent;border:1px solid var(--hk-red-border);color:var(--text);
    padding:6px 14px;border-radius:4px;font-family:var(--font-body);font-size:12px;
    cursor:pointer;transition:all 0.15s;white-space:nowrap;
  }
  .export-btn:hover{background:var(--hk-red);border-color:var(--hk-red);color:#fff;box-shadow:0 0 10px rgba(232,0,29,0.3)}

  /* ══ LAYOUT ══════════════════════════════════════════════════════ */
  .app{display:flex;height:calc(100vh - 58px)}

  /* ── Sidebar ── */
  .sidebar{
    width:240px;min-width:240px;
    background:var(--surface);
    border-right:1px solid var(--border);
    display:flex;flex-direction:column;overflow:hidden;
  }
  .sidebar-head{
    padding:12px 16px;border-bottom:1px solid var(--border);
    font-family:var(--font-head);font-size:10px;font-weight:700;letter-spacing:0.16em;
    color:var(--hk-red);text-transform:uppercase;
    display:flex;align-items:center;gap:7px;
  }
  .sidebar-head::before{content:'';display:inline-block;width:3px;height:12px;background:var(--hk-red);border-radius:2px}

  .game-list{flex:1;overflow-y:auto;padding:6px}
  .game-item{
    padding:7px 9px;border-radius:5px;cursor:pointer;
    border:1px solid transparent;margin-bottom:2px;transition:all 0.15s;position:relative;
  }
  .game-item:hover{background:var(--surface2);border-color:var(--border2)}
  .game-item:hover .game-item-actions{opacity:1;pointer-events:auto}
  .game-item.active{background:var(--hk-red-bg);border-color:var(--hk-red-border);border-left:2px solid var(--hk-red)}
  .game-item.active .game-item-actions{opacity:1;pointer-events:auto}
  .game-item-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:42px}
  .game-item-meta{font-size:10px;color:var(--muted);margin-top:2px;font-family:var(--font-mono)}
  .game-item-actions{position:absolute;top:6px;right:6px;display:flex;gap:2px;opacity:0;pointer-events:none;transition:opacity 0.12s}
  .gi-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);width:18px;height:18px;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;line-height:1;padding:0;transition:all 0.12s;flex-shrink:0}
  .gi-btn:hover{color:var(--text);border-color:var(--border2)}
  .gi-btn.del:hover{color:var(--red);border-color:var(--red)}
  .game-item-rename{display:flex;gap:4px;align-items:center;margin-top:4px}
  .rename-input{background:var(--surface2);border:1px solid var(--hk-red);color:var(--text);padding:3px 7px;border-radius:4px;font-family:var(--font-mono);font-size:11px;flex:1;min-width:0}
  .rename-input:focus{outline:none}
  .rename-ok{background:var(--hk-red-bg);border:1px solid var(--hk-red);color:var(--hk-red);padding:3px 7px;border-radius:4px;font-family:var(--font-mono);font-size:10px;cursor:pointer}
  .rename-ok:hover{background:var(--hk-red);color:#fff}

  .sidebar-footer{padding:10px 12px;border-top:1px solid var(--border)}
  .upload-zone{
    border:1.5px dashed var(--border2);border-radius:7px;padding:12px;
    text-align:center;cursor:pointer;transition:all 0.2s;
  }
  .upload-zone:hover,.upload-zone.drag{border-color:var(--hk-red);background:var(--hk-red-bg)}
  .upload-zone input{display:none}
  .upload-zone p{font-size:11px;color:var(--muted);line-height:1.4;margin-top:4px}
  .upload-zone strong{color:var(--text);font-size:12px}

  /* ══ MAIN CONTENT ════════════════════════════════════════════════ */
  .main{flex:1;overflow-y:auto;padding:20px 24px}
  .page{display:none}.page.active{display:block}

  /* ── Empty state ── */
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;color:var(--muted)}
  .empty-state h2{font-family:var(--font-head);font-size:22px;font-weight:600;color:var(--text);margin-bottom:8px}
  .empty-state p{font-size:13px;max-width:340px;line-height:1.6}

  /* ── Page headers ── */
  .game-title{
    font-family:var(--font-head);font-size:30px;font-weight:800;letter-spacing:0.02em;
    margin-bottom:3px;
    background:linear-gradient(90deg,var(--text) 60%,var(--hk-red) 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }
  .game-subtitle{font-size:12px;color:var(--muted);font-family:var(--font-mono);margin-bottom:20px}

  /* ── Section labels ── */
  .section{margin-bottom:24px}
  .section-label{
    font-family:var(--font-head);font-size:10px;font-weight:700;letter-spacing:0.16em;
    text-transform:uppercase;color:var(--hk-red);margin-bottom:10px;
    display:flex;align-items:center;gap:8px;
  }
  .section-label::before{content:'';width:3px;height:12px;background:var(--hk-red);border-radius:2px;flex-shrink:0}
  .section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--hk-red-border),transparent)}

  /* ── Stat cards ── */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:12px 14px}
  .stat-card.green{border-left:3px solid var(--green)}
  .stat-card.red{border-left:3px solid var(--hk-red)}
  .stat-card.accent{border-left:3px solid var(--hk-red)}
  .stat-card.gold{border-left:3px solid var(--gold)}
  .stat-label{font-size:10px;color:var(--muted);margin-bottom:5px;letter-spacing:0.04em}
  .stat-value{font-family:var(--font-mono);font-size:20px;font-weight:500}
  .stat-sub{font-size:10px;color:var(--muted);margin-top:3px;font-family:var(--font-mono)}
  .half-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}

  /* ── Continuum ── */
  .continuum-wrap{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:14px}
  .continuum-half{margin-bottom:14px}.continuum-half:last-of-type{margin-bottom:0}
  .continuum-half-label{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-bottom:5px;display:flex;justify-content:space-between}
  .continuum-bar{height:28px;display:flex;border-radius:3px;overflow:hidden}
  .continuum-seg{height:100%;cursor:default;transition:opacity 0.1s}
  .continuum-seg:hover{opacity:0.75}
  .continuum-seg.bip{background:var(--green)}
  .continuum-seg.oop{background:var(--red-dim)}
  .tick-row{position:relative;height:14px}
  .tick{font-family:var(--font-mono);font-size:9px;color:var(--muted);position:absolute;transform:translateX(-50%)}

  /* ── Tooltip ── */
  .tooltip{position:fixed;background:var(--surface3);border:1px solid var(--border2);border-radius:5px;padding:7px 11px;font-family:var(--font-mono);font-size:11px;color:var(--text);pointer-events:none;z-index:9999;display:none;white-space:nowrap;line-height:1.6}
  .tooltip.bip-tip{border-left:3px solid var(--green)}
  .tooltip.oop-tip{border-left:3px solid var(--red)}
  .tooltip.event-tip{border-left:3px solid var(--gold)}

  /* ── Frequency tables ── */
  .freq-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .freq-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:7px;overflow:hidden}
  .freq-table-head{padding:9px 13px;font-family:var(--font-head);font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;display:flex;align-items:center;gap:7px}
  .freq-table-head.bip-head{background:var(--green-bg);color:var(--green);border-bottom:1px solid rgba(34,197,94,0.15)}
  .freq-table-head.oop-head{background:var(--hk-red-bg);color:var(--hk-red);border-bottom:1px solid var(--hk-red-border)}
  .freq-dot{width:7px;height:7px;border-radius:50%}
  .freq-dot.green{background:var(--green)}.freq-dot.red{background:var(--hk-red)}

  /* ── Tables ── */
  table{width:100%;border-collapse:collapse}
  td,th{padding:7px 13px;text-align:left;font-size:11px;border-bottom:1px solid var(--border)}
  th{font-family:var(--font-mono);font-size:9px;color:var(--muted);font-weight:400;letter-spacing:0.06em;text-transform:uppercase}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(232,0,29,0.03)}
  td:not(:first-child),th:not(:first-child){text-align:right;font-family:var(--font-mono)}
  .bar-cell{display:flex;align-items:center;gap:5px}
  .mini-bar{height:4px;border-radius:2px}
  .mini-bar.green{background:var(--green)}.mini-bar.red{background:var(--hk-red)}

  /* ── Peak cards ── */
  .peak-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .peak-card{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:13px 15px;display:flex;flex-direction:column;gap:5px;border-top:2px solid var(--hk-red)}
  .peak-label{font-size:10px;color:var(--muted);letter-spacing:0.04em}
  .peak-pct{font-family:var(--font-mono);font-size:26px;font-weight:500;color:var(--green)}
  .peak-detail{font-family:var(--font-mono);font-size:10px;color:var(--muted)}

  /* ── Tally page ── */
  .tally-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
  .tally-card{background:var(--surface);border:1px solid var(--border);border-radius:7px;overflow:hidden}
  .tally-head{padding:10px 14px;font-family:var(--font-head);font-size:13px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;color:var(--hk-red)}
  .tally-table td:first-child{color:var(--muted);font-size:11px}
  .tally-table td{padding:7px 13px;font-size:11px}
  .tally-table tr:last-child td{border-bottom:none}
  .highlight-val{color:var(--text);font-family:var(--font-mono);font-weight:500}
  .dim-val{color:var(--muted);font-family:var(--font-mono)}
  .team-dot{width:9px;height:9px;border-radius:50%;display:inline-block}

  /* ── Event toggles ── */
  .toggle-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;align-items:center}
  .toggle-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:var(--font-mono);font-size:11px;cursor:pointer;transition:all 0.15s;user-select:none}
  .toggle-btn:hover{border-color:var(--hk-red-border);filter:brightness(1.2)}
  .toggle-btn.off{opacity:0.35;background:transparent}
  .toggle-btn .tog-icon{display:flex;align-items:center}
  .event-marker[data-etype="try"].hide-try,
  .event-marker[data-etype="scrum"].hide-scrum,
  .event-marker[data-etype="lineout"].hide-lineout,
  .event-marker[data-etype="penalty"].hide-penalty,
  .event-marker[data-etype="yellow"].hide-yellow,
  .event-marker[data-etype="red"].hide-red{display:none !important}
  .legend-item{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-family:var(--font-mono)}

  /* ── Summary charts ── */
  .summary-chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:8px}
  .summary-chart-head{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:10px;background:var(--surface2)}
  .summary-chart-title{font-family:var(--font-head);font-size:13px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text)}
  .summary-chart-sub{font-size:11px;color:var(--muted);font-family:var(--font-mono)}
  .summary-chart-body{padding:16px}
  .chart-svg{width:100%;overflow:visible;display:block}
  .chart-axis{stroke:#3d2225;stroke-width:1}
  .chart-grid{stroke:#2e1a1d;stroke-width:1;stroke-dasharray:3 4}
  .chart-label{font-family:'DM Mono',monospace;font-size:10px;fill:#8a7275}
  .chart-val{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;fill:#f0e8e9}
  .chart-legend{display:flex;gap:14px;flex-wrap:wrap;padding:10px 16px 14px;border-top:1px solid var(--border)}
  .chart-legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);font-family:var(--font-mono)}
  .chart-legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
  .summary-no-data{padding:32px;text-align:center;color:var(--muted);font-size:13px;font-family:var(--font-mono)}

  /* ── Drag strip ── */
  .summary-drag-strip{display:flex;flex-wrap:wrap;gap:6px;padding:12px 16px;border-bottom:1px solid var(--border);align-items:center;background:var(--surface2)}
  .summary-drag-label{font-size:10px;color:var(--muted);font-family:var(--font-mono);letter-spacing:0.06em;margin-right:4px;white-space:nowrap}
  .summary-drag-item{display:inline-flex;align-items:center;gap:7px;padding:5px 11px;border-radius:5px;border:1px solid var(--border2);background:var(--surface3);font-family:var(--font-mono);font-size:11px;cursor:grab;user-select:none;transition:all 0.12s}
  .summary-drag-item:hover{border-color:var(--hk-red-border);filter:brightness(1.15)}
  .summary-drag-item.drag-active{opacity:0.4;cursor:grabbing}
  .summary-drag-item.drag-over{border-color:var(--hk-red);background:var(--hk-red-bg);box-shadow:0 0 0 1px var(--hk-red)}
  .summary-drag-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .drag-grip{color:var(--muted);font-size:12px;letter-spacing:-1px;line-height:1}

  /* ── Sortable headers ── */
  th.sortable{cursor:pointer;user-select:none;white-space:nowrap;transition:color 0.12s}
  th.sortable:hover{color:var(--hk-red)}
  th.sort-asc::after{content:' ▲';color:var(--hk-red)}
  th.sort-desc::after{content:' ▼';color:var(--hk-red)}

  /* ── Scrollbars ── */
  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:var(--hk-red-dim)}
</style>
</head>
<body>

<header>

<script>
const games = {};
let activeGame = null;
let activePage = 'overview';
// which event types are currently visible on the Event Timeline
const activeFilters = { try:true, scrum:true, lineout:true, penalty:true, yellow:true, red:true };

const TEAM_COLOURS = ['#f59e0b','#818cf8','#34d399','#f472b6','#60a5fa','#fb7185','#a78bfa','#2dd4bf','#facc15','#4ade80'];

function teamColour(team, teamNames) {
  const idx = teamNames.indexOf(team);
  return TEAM_COLOURS[idx % TEAM_COLOURS.length];
}

function fmtMSS(s) {
  const m = Math.floor(Math.abs(s)/60), sec = Math.round(Math.abs(s)%60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}
function fmtS(s) { return parseFloat(s).toFixed(1)+'s'; }
function fmtPM(n, mins) { return mins > 0 ? (n/mins).toFixed(2) : '—'; }

// ── SVG icons ────────────────────────────────────────────────────────
function rugbyBallSVG(colour, size) {
  const s = size||18;
  return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" style="display:inline-block;vertical-align:middle;flex-shrink:0" aria-hidden="true">
    <ellipse cx="12" cy="12" rx="9" ry="5.5" fill="${colour}" transform="rotate(-35 12 12)"/>
    <line x1="6.5" y1="8.5" x2="17.5" y2="15.5" stroke="rgba(0,0,0,0.25)" stroke-width="1" stroke-linecap="round"/>
    <line x1="9" y1="6.8" x2="10.5" y2="17.2" stroke="rgba(255,255,255,0.4)" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="13.5" y1="6.8" x2="15" y2="17.2" stroke="rgba(255,255,255,0.4)" stroke-width="0.8" stroke-linecap="round"/>
  </svg>`;
}

function cardSVG(cardType, size) {
  const s = size||16;
  const colour = cardType === 'yellow' ? '#eab308' : '#dc2626';
  return `<svg width="${s}" height="${s*1.4}" viewBox="0 0 14 20" style="display:inline-block;vertical-align:middle;flex-shrink:0" aria-hidden="true">
    <rect x="1" y="1" width="12" height="18" rx="2" fill="${colour}" stroke="rgba(0,0,0,0.3)" stroke-width="0.5"/>
  </svg>`;
}

function scrumSVG(colour, size) {
  const s = size||16;
  return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" style="display:inline-block;vertical-align:middle;flex-shrink:0" aria-hidden="true">
    <circle cx="12" cy="12" r="10" fill="none" stroke="${colour}" stroke-width="2"/>
    <circle cx="12" cy="12" r="4" fill="${colour}"/>
    <line x1="2" y1="12" x2="8" y2="12" stroke="${colour}" stroke-width="2"/>
    <line x1="16" y1="12" x2="22" y2="12" stroke="${colour}" stroke-width="2"/>
  </svg>`;
}

function lineoutSVG(colour, size) {
  const s = size||16;
  return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" style="display:inline-block;vertical-align:middle;flex-shrink:0" aria-hidden="true">
    <rect x="2" y="10" width="20" height="4" rx="1" fill="${colour}" opacity="0.35"/>
    <circle cx="6" cy="12" r="3" fill="${colour}"/>
    <circle cx="12" cy="7" r="3" fill="${colour}"/>
    <circle cx="18" cy="12" r="3" fill="${colour}"/>
    <line x1="12" y1="2" x2="12" y2="22" stroke="${colour}" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.6"/>
  </svg>`;
}

function penaltySVG(colour, size) {
  const s = size||16;
  return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" style="display:inline-block;vertical-align:middle;flex-shrink:0" aria-hidden="true">
    <polygon points="12,2 22,20 2,20" fill="none" stroke="${colour}" stroke-width="2" stroke-linejoin="round"/>
    <line x1="12" y1="9" x2="12" y2="14" stroke="${colour}" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="12" cy="17.5" r="1.5" fill="${colour}"/>
  </svg>`;
}

function iconForEvent(type, colour, size) {
  if (type === 'try')      return rugbyBallSVG(colour, size);
  if (type === 'yellow')   return cardSVG('yellow', size);
  if (type === 'red')      return cardSVG('red', size);
  if (type === 'scrum')    return scrumSVG(colour, size);
  if (type === 'lineout')  return lineoutSVG(colour, size);
  if (type === 'penalty')  return penaltySVG(colour, size);
  return '';
}

// ── XML parser ────────────────────────────────────────────────────────
function parseXML(xmlText, filename) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlText, 'text/xml');
  const instances = doc.querySelectorAll('instance');

  // ── Step 1: detect all team names from codes ────────────────────
  // Supports both "Team Select Action" and "Team Action" formats.
  // We collect candidate team prefixes then pick the ones that appear
  // with multiple different action suffixes (i.e. real teams, not one-off labels).
  const BIP_PATTERNS = /ball in play/i;
  const SKIP_PATTERNS = /^(HKCR|OPP|HKG|HKC|Alex|Ben|Callum|Faizal|Harry|Jack|James|Joe|Joshua|Keelan|Korea\s+Half|Hong\s+Kong\s+Half|Luke|Mark|Matt|Max|Nate|Patrick|Paul|Pierce|Rory|Sunia|Thomas)/i;

  const codeCounts = {};
  instances.forEach(inst => {
    const code = inst.querySelector('code')?.textContent?.trim();
    if (code) codeCounts[code] = (codeCounts[code]||0) + 1;
  });

  // Extract prefix before known action words — works for both formats
  const ACTION_WORDS = /\s+(Try|Scrum|Lineout|Penalty|Penalties|Breakdown|Rucks?|Maul|Phase\s+Attack|Tackles?|Turnover|Possession|Restart|Kick|Counter|Attacking|Line\s+Break|Quick|Conversion|Start|Shot|Handling|Zone)\b/i;
  const teamCandidates = {};
  Object.keys(codeCounts).forEach(code => {
    if (BIP_PATTERNS.test(code)) return;
    const m = code.match(ACTION_WORDS);
    if (!m) return;
    const prefix = code.slice(0, m.index).replace(/\s+Select$/i,'').trim();
    if (!prefix || SKIP_PATTERNS.test(prefix) || prefix.length < 3) return;
    teamCandidates[prefix] = (teamCandidates[prefix]||0) + 1;
  });
  // Keep prefixes that appear with 2+ different actions (real teams)
  const detectedTeams = Object.entries(teamCandidates)
    .filter(([,n]) => n >= 2)
    .map(([t]) => t)
    .sort();

  // ── Step 2: collect all BIP candidates grouped by exact code ───────
  // Multiple files use different BIP code names; we pick the single best source.
  // Priority: prefer a non-team-specific code (no team prefix) with the most phases.
  const bipByCode = {};
  instances.forEach(inst => {
    const code = inst.querySelector('code')?.textContent?.trim();
    if (!code || !BIP_PATTERNS.test(code)) return;
    const start = parseFloat(inst.querySelector('start')?.textContent);
    const end   = parseFloat(inst.querySelector('end')?.textContent);
    if (isNaN(start) || isNaN(end) || end <= start) return;
    if (!bipByCode[code]) bipByCode[code] = [];
    bipByCode[code].push([start, end]);
  });

  // Score each BIP code: prefer codes with no team prefix and most phases
  let bestBipCode = null, bestBipScore = -1;
  for (const [code, phases] of Object.entries(bipByCode)) {
    const hasTeamPrefix = detectedTeams.some(t =>
      new RegExp('^' + t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'i').test(code)
    );
    // score: non-team-specific codes score higher; then by phase count
    const score = (hasTeamPrefix ? 0 : 10000) + phases.length;
    if (score > bestBipScore) { bestBipScore = score; bestBipCode = code; }
  }
  const bip = bestBipCode ? bipByCode[bestBipCode] : [];
  const events = [];

  // Pre-compile team regexes once — used in multiple passes below
  const teamRegexes = detectedTeams.map(t => ({
    name: t,
    re: new RegExp('^' + t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '(\\s+Select)?\\s+', 'i')
  }));

  instances.forEach(inst => {
    const code = inst.querySelector('code')?.textContent?.trim();
    if (!code) return;
    const start = parseFloat(inst.querySelector('start')?.textContent);
    const end   = parseFloat(inst.querySelector('end')?.textContent);

    if (BIP_PATTERNS.test(code)) return;

    const lc = code.toLowerCase();
    let type = null, team = null;

    for (const { name, re } of teamRegexes) {
      if (re.test(code)) { team = name; break; }
    }

    // Classify event type
    if (lc.includes('yellow card'))                                          type = 'yellow';
    else if (lc.includes('red card'))                                        type = 'red';
    else if (/\btry\b/i.test(code) && team && !/attack/i.test(code))        type = 'try';
    else if (/scrum/i.test(code) && !/attack|speed/i.test(code) && team)    type = 'scrum';
    else if (/lineout/i.test(code) && !/attack/i.test(code) && team)        type = 'lineout';
    else if (/penalt/i.test(code) && team)                                   type = 'penalty';

    if (type && !isNaN(start)) events.push({ time: start, end: isNaN(end)?start:end, type, team, code });
  });

  bip.sort((a,b) => a[0]-b[0]);
  if (bip.length < 2) return null;

  // ── Step 3: detect halftime (largest gap between BIP phases) ────
  let maxGap = 0, gapIdx = 0;
  for (let i = 0; i < bip.length-1; i++) {
    const gap = bip[i+1][0] - bip[i][1];
    if (gap > maxGap) { maxGap = gap; gapIdx = i; }
  }

  const half1 = bip.slice(0, gapIdx+1);
  const half2 = bip.slice(gapIdx+1);
  const halftimeMid = (half1[half1.length-1][1] + half2[0][0]) / 2;

  function oopPeriods(phases) {
    const oop = [];
    for (let i = 0; i < phases.length-1; i++) {
      const dur = phases[i+1][0] - phases[i][1];
      if (dur > 0.5) oop.push([phases[i][1], phases[i+1][0], dur]);
    }
    return oop;
  }

  function stats(phases) {
    const durs = phases.map(p => p[1]-p[0]);
    const total = durs.reduce((a,b)=>a+b,0);
    const start = phases[0][0], end = phases[phases.length-1][1];
    const halfDur = end - start;
    return { phases, durs, total, halfDur, pct: total/halfDur*100,
             avg: total/durs.length, longest: Math.max(...durs),
             shortest: Math.min(...durs), n: durs.length };
  }

  function bipInWindow(ws, we, phases) {
    let t=0;
    for (const [s,e] of phases) { const ov=Math.min(e,we)-Math.max(s,ws); if(ov>0) t+=ov; }
    return t;
  }

  function bestWindow(winSecs, phases, segStart, segEnd) {
    // Only need to check windows starting at each phase boundary
    // (the optimal window always starts at a phase start or end)
    const candidates = [segStart];
    for (const [s, e] of phases) {
      if (s > segStart) candidates.push(s);
      if (e > segStart && e + winSecs <= segEnd + 1) candidates.push(Math.max(segStart, e - winSecs));
    }
    let best = 0, bws = segStart;
    for (const t of candidates) {
      if (t + winSecs > segEnd + 1) continue;
      const b = bipInWindow(t, t + winSecs, phases) / winSecs * 100;
      if (b > best) { best = b; bws = t; }
    }
    return { pct: best, start: bws, end: bws + winSecs };
  }

  const h1=stats(half1), h2=stats(half2);
  const h1oop=oopPeriods(half1), h2oop=oopPeriods(half2);
  const allOop=[...h1oop,...h2oop];
  const seg1=[half1[0][0],half1[half1.length-1][1]];
  const seg2=[half2[0][0],half2[half2.length-1][1]];

  const win10_1=bestWindow(600,half1,seg1[0],seg1[1]);
  const win10_2=bestWindow(600,half2,seg2[0],seg2[1]);
  const win20_1=bestWindow(1200,half1,seg1[0],seg1[1]);
  const win20_2=bestWindow(1200,half2,seg2[0],seg2[1]);
  const best10=win10_1.pct>=win10_2.pct?{...win10_1,half:'H1',offset:seg1[0]}:{...win10_2,half:'H2',offset:seg2[0]};
  const best20=win20_1.pct>=win20_2.pct?{...win20_1,half:'H1',offset:seg1[0]}:{...win20_2,half:'H2',offset:seg2[0]};

  function bucketBIP(d){if(d<=30)return'0–30s';if(d<=60)return'30–60s';if(d<=90)return'60–90s';if(d<=120)return'90–120s';return'>120s';}
  function bucketOOP(d){if(d<=15)return'0–15s';if(d<=30)return'15–30s';if(d<=45)return'30–45s';if(d<=60)return'45–60s';if(d<=90)return'60–90s';return'>90s';}
  const BIP_BANDS=['0–30s','30–60s','60–90s','90–120s','>120s'];
  const OOP_BANDS=['0–15s','15–30s','30–45s','45–60s','60–90s','>90s'];
  function freqCount(durs,fn,bands){const c=Object.fromEntries(bands.map(b=>[b,0]));durs.forEach(d=>{const b=fn(d);if(c[b]!==undefined)c[b]++;});return c;}

  // ── Step 4: tally stats (format-agnostic matching) ───────────────
  const teamNames = detectedTeams.length ? detectedTeams
    : [...new Set(events.filter(e=>e.team).map(e=>e.team))].sort();

  const TALLY_TESTS = {
    carries:  code => /phase\s+attack/i.test(code),
    rucks:    code => /rucks?/i.test(code) && !/speed/i.test(code),
    scrums:   code => /scrum/i.test(code) && !/attack|speed/i.test(code),
    mauls:    code => /maul/i.test(code),
    breakdowns: code => /breakdown/i.test(code),
  };

  const allEvents2 = [];
  instances.forEach(inst => {
    const code = inst.querySelector('code')?.textContent?.trim();
    if (!code || BIP_PATTERNS.test(code)) return;
    const start = parseFloat(inst.querySelector('start')?.textContent);
    if (isNaN(start)) return;
    let team = null;
    for (const { name, re } of teamRegexes) {
      if (re.test(code)) { team = name; break; }
    }
    if (!team) return;
    for (const [tallyKey, testFn] of Object.entries(TALLY_TESTS)) {
      if (testFn(code)) allEvents2.push({ time: start, team, tally: tallyKey, code });
    }
  });

  function tallyForHalf(halfStart, halfEnd) {
    const keys = Object.keys(TALLY_TESTS);
    const result = {};
    for (const tn of teamNames) result[tn] = Object.fromEntries(keys.map(k=>[k,0]));
    allEvents2.forEach(e => {
      if (e.time >= halfStart && e.time <= halfEnd && result[e.team]) {
        result[e.team][e.tally] = (result[e.team][e.tally]||0) + 1;
      }
    });
    return result;
  }

  const h1Tally = tallyForHalf(seg1[0], seg1[1]);
  const h2Tally = tallyForHalf(seg2[0], seg2[1]);

  return {
    filename,
    half1, half2, h1, h2, h1oop, h2oop, allOop,
    best10, best20,
    bipBands:BIP_BANDS, oopBands:OOP_BANDS,
    h1BipFreq:freqCount(h1.durs,bucketBIP,BIP_BANDS),
    h2BipFreq:freqCount(h2.durs,bucketBIP,BIP_BANDS),
    h1OopFreq:freqCount(h1oop.map(o=>o[2]),bucketOOP,OOP_BANDS),
    h2OopFreq:freqCount(h2oop.map(o=>o[2]),bucketOOP,OOP_BANDS),
    h1Offset:seg1[0], h2Offset:seg2[0], h1End:seg1[1], h2End:seg2[1],
    events, teamNames,
    h1Events: events.filter(e=>e.time<halftimeMid),
    h2Events: events.filter(e=>e.time>=halftimeMid),
    h1Tally, h2Tally,
    h1BipMins: h1.total/60, h2BipMins: h2.total/60,
    h1TotalMins: h1.halfDur/60, h2TotalMins: h2.halfDur/60,
    tallyKeys: Object.keys(TALLY_TESTS)
  };
}

// ── Page navigation ────────────────────────────────────────────────
function showPage(page) {
  activePage = page;
  document.querySelectorAll('.nav-btn').forEach((b,i) => {
    b.classList.toggle('active', ['overview','events','tally','summary'][i] === page);
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  if (page === 'summary') renderSummary();
}

function addGame(data) {
  games[data.filename] = data;
  syncSummaryOrder();
  renderSidebar();
  selectGame(data.filename);
}

// which game item is in rename mode
let renamingGame = null;

function renderSidebar() {
  const list = document.getElementById('gameList');
  const names = Object.keys(games);
  if (!names.length) {
    list.innerHTML = '<div style="padding:14px;font-size:11px;color:var(--muted);text-align:center;line-height:1.6">Upload XML files to begin</div>';
    return;
  }
  list.innerHTML = names.map(n => {
    const g = games[n];
    const totalBip = g.h1.total+g.h2.total, totalDur = g.h1.halfDur+g.h2.halfDur;
    const isRenaming = renamingGame === n;
    const safeN = n.replace(/'/g,"\\'").replace(/"/g,'&quot;');
    return `<div class="game-item ${n===activeGame?'active':''}" onclick="handleGameItemClick(event,'${safeN}')">
      <div style="display:flex;align-items:center">
        <div class="game-item-name" style="flex:1">${n}</div>
        <div class="game-item-actions">
          <button class="gi-btn" onclick="event.stopPropagation();startRename('${safeN}')" title="Rename">✎</button>
          <button class="gi-btn del" onclick="event.stopPropagation();deleteGame('${safeN}')" title="Delete">✕</button>
        </div>
      </div>
      <div class="game-item-meta">BIP: ${fmtMSS(totalBip)} · ${(totalBip/totalDur*100).toFixed(0)}%</div>
      ${isRenaming ? `<div class="game-item-rename" onclick="event.stopPropagation()">
        <input class="rename-input" id="rename-input-field" value="${n.replace(/"/g,'&quot;')}" onkeydown="handleRenameKey(event,'${safeN}')">
        <button class="rename-ok" onclick="event.stopPropagation();commitRename('${safeN}')">✓</button>
      </div>` : ''}
    </div>`;
  }).join('');
  // focus rename input if open
  if (renamingGame) {
    const inp = document.getElementById('rename-input-field');
    if (inp) { inp.focus(); inp.select(); }
  }
}

function handleGameItemClick(event, name) {
  if (renamingGame) return; // don't switch while renaming
  selectGame(name);
}

function startRename(name) {
  renamingGame = name;
  renderSidebar();
}

function handleRenameKey(event, oldName) {
  if (event.key === 'Enter') commitRename(oldName);
  if (event.key === 'Escape') { renamingGame = null; renderSidebar(); }
}

function commitRename(oldName) {
  const inp = document.getElementById('rename-input-field');
  const newName = inp ? inp.value.trim() : oldName;
  renamingGame = null;
  if (!newName || newName === oldName) { renderSidebar(); return; }
  if (games[newName]) { alert('A game with that name already exists.'); renderSidebar(); return; }
  // Rename: move the entry, update activeGame ref
  const data = games[oldName];
  data.filename = newName;
  games[newName] = data;
  delete games[oldName];
  if (activeGame === oldName) activeGame = newName;
  syncSummaryOrder();
  renderSidebar();
  if (activePage === 'summary') renderSummary();
  else renderAll(games[activeGame]);
}

function deleteGame(name) {
  delete games[name];
  if (activeGame === name) {
    const remaining = Object.keys(games);
    activeGame = remaining.length ? remaining[remaining.length-1] : null;
  }
  renamingGame = null;
  syncSummaryOrder();
  renderSidebar();
  if (activeGame) {
    document.getElementById('emptyState').style.display = 'none';
    renderAll(games[activeGame]);
    if (activePage === 'summary') renderSummary();
  } else {
    document.getElementById('emptyState').style.display = 'flex';
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('exportBtn').style.display = 'none';
  }
}

function selectGame(name) {
  activeGame = name;
  renderSidebar();
  document.getElementById('emptyState').style.display = 'none';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+activePage).classList.add('active');
  renderAll(games[name]);
  document.getElementById('exportBtn').style.display = 'inline-flex';
}

function renderAll(g) {
  renderOverview(g);
  renderEvents(g);
  renderTally(g);
  attachTooltips();
}

        <div class="stat-card green"><div class="stat-label">BIP phases</div><div class="stat-value">${g.h1.n+g.h2.n}</div><div class="stat-sub">avg ${fmtS(totalBip/(g.h1.n+g.h2.n))}</div></div>

        <div class="stat-card red"><div class="stat-label">Avg rest</div><div class="stat-value">${fmtS(avgOop)}</div><div class="stat-sub">longest: ${fmtMSS(Math.max(...allOopDurs))}</div></div>
        <div class="stat-card gold"><div class="stat-label">Longest BIP</div><div class="stat-value">${fmtMSS(Math.max(g.h1.longest,g.h2.longest))}</div><div class="stat-sub">shortest: ${fmtS(Math.min(g.h1.shortest,g.h2.shortest))}</div></div>
        <div class="stat-card accent"><div class="stat-label">Peak 10min BIP</div><div class="stat-value">${g.best10.pct.toFixed(1)}%</div><div class="stat-sub">${g.best10.half} · ${fmtMSS(g.best10.start-g.best10.offset)}–${fmtMSS(g.best10.end-g.best10.offset)}</div></div>
      </div>
    </div>

    <div class="section"><div class="section-label">By half</div>
      <div class="half-row">
        ${halfCard('First Half',g.h1,g.h1oop)}
        ${halfCard('Second Half',g.h2,g.h2oop)}

    </div>

    <div class="section"><div class="section-label">Time continuum</div>
      <div class="continuum-wrap">
        ${continuumHalf('First Half',g.half1,g.h1Offset,g.h1End,g.h1Events,g.teamNames,false)}
        <div style="height:1px;background:var(--border);margin:12px 0"></div>
        ${continuumHalf('Second Half',g.half2,g.h2Offset,g.h2End,g.h2Events,g.teamNames,false)}
        ${tryLegend(g.teamNames,'try')}
      </div>
    </div>

    <div class="section"><div class="section-label">Frequency analysis</div>
      <div class="freq-grid">
        ${freqTable('Ball in play','bip',g.bipBands,g.h1BipFreq,g.h2BipFreq)}
        ${freqTable('Ball out of play','oop',g.oopBands,g.h1OopFreq,g.h2OopFreq)}
      </div>
    </div>

    <div class="section"><div class="section-label">Peak windows</div>
      <div class="peak-grid">
        ${peakCard('Best 10-minute window',g.best10,g.h1Offset,g.h2Offset)}

      </div>
    </div>`;
}

// PAGE 3: Team Tally
// ══════════════════════════════════════════════════════════════════
function renderTally(g) {
  const ACTIONS = g.tallyKeys || ['carries','rucks','scrums','mauls','breakdowns'];
  const ACTION_LABELS = {carries:'Carries',rucks:'Rucks',scrums:'Scrums',mauls:'Mauls',breakdowns:'Breakdowns',tackles:'Tackles'};

  function teamTallyTable(halfLabel, tally, totalMins, bipMins) {
    const rows = ACTIONS.map(act => {
      const cells = g.teamNames.map(tn => {
        const n = tally[tn]?.[act] || 0;
        const perMin = fmtPM(n, totalMins);
        const perBIP = fmtPM(n, bipMins);
        return `<td class="highlight-val">${n}</td><td class="dim-val">${perMin}</td><td class="dim-val">${perBIP}</td>`;
      }).join('');
      return `<tr><td style="color:var(--muted);font-size:11px">${ACTION_LABELS[act]}</td>${cells}</tr>`;
    }).join('');

    const teamHeaders = g.teamNames.map(tn => {
      const col = teamColour(tn, g.teamNames);
      return `<th colspan="3" style="text-align:center;border-left:1px solid var(--border)">
        <span style="display:inline-flex;align-items:center;gap:5px">
          <span style="width:7px;height:7px;border-radius:50%;background:${col};display:inline-block"></span>${tn}
        </span>
      </th>`;
    }).join('');

    const subHeaders = g.teamNames.map(() =>
      `<th style="border-left:1px solid var(--border)">Count</th><th>/min</th><th>/BIP min</th>`
    ).join('');

    return `<div class="tally-card" style="margin-bottom:10px">
      <div class="tally-head">
        <span style="width:8px;height:8px;background:var(--accent);border-radius:50%;display:inline-block"></span>
        ${halfLabel}
        <span style="font-size:10px;color:var(--muted);font-weight:400;margin-left:4px">· ${totalMins.toFixed(1)} min total · ${bipMins.toFixed(1)} min BIP</span>
      </div>
      <div style="overflow-x:auto">
        <table class="tally-table">
          <thead>
            <tr><th></th>${teamHeaders}</tr>
            <tr><th>Action</th>${subHeaders}</tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }

  // totals across both halves
  function combinedTally() {
    const combined = {};
    for (const tn of g.teamNames) {
      combined[tn] = {};
      for (const act of ACTIONS) {
        combined[tn][act] = (g.h1Tally[tn]?.[act]||0) + (g.h2Tally[tn]?.[act]||0);
      }
    }
    return combined;
  }

  document.getElementById('dash-tally').innerHTML = `
    <div class="game-title">${g.filename}</div>
    <div class="game-subtitle">Team action counts with rates per minute of game time and BIP time</div>

    <div class="section"><div class="section-label">First half</div>
      ${teamTallyTable('First Half', g.h1Tally, g.h1TotalMins, g.h1BipMins)}
    </div>

    <div class="section"><div class="section-label">Second half</div>
      ${teamTallyTable('Second Half', g.h2Tally, g.h2TotalMins, g.h2BipMins)}
    </div>

    <div class="section"><div class="section-label">Full game</div>
      ${teamTallyTable('Full Game', combinedTally(), g.h1TotalMins+g.h2TotalMins, g.h1BipMins+g.h2BipMins)}
    </div>`;
}

// ── Shared rendering helpers ───────────────────────────────────────
function halfCard(label, h, oop) {
  const oopDurs = oop.map(o=>o[2]);
  const avgOop = oopDurs.length ? oopDurs.reduce((a,b)=>a+b,0)/oopDurs.length : 0;
  return `<div class="stat-card" style="border:1px solid var(--border)">
    <div style="font-family:var(--font-head);font-size:13px;font-weight:600;letter-spacing:0.05em;margin-bottom:10px;color:var(--muted)">${label.toUpperCase()}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">
      <div><div class="stat-label">BIP time</div><div style="font-family:var(--font-mono);font-size:15px">${fmtMSS(h.total)}</div></div>
      <div><div class="stat-label">BIP %</div><div style="font-family:var(--font-mono);font-size:15px;color:var(--green)">${h.pct.toFixed(1)}%</div></div>
      <div><div class="stat-label">Phases</div><div style="font-family:var(--font-mono);font-size:15px">${h.n}</div></div>
      <div><div class="stat-label">Avg phase</div><div style="font-family:var(--font-mono);font-size:15px">${fmtS(h.avg)}</div></div>
      <div><div class="stat-label">Longest BIP</div><div style="font-family:var(--font-mono);font-size:15px">${fmtMSS(h.longest)}</div></div>
      <div><div class="stat-label">Avg rest</div><div style="font-family:var(--font-mono);font-size:15px;color:var(--red)">${fmtS(avgOop)}</div></div>
    </div>
  </div>`;
}

function continuumHalf(label, phases, hStart, hEnd, events, teamNames, showAllEvents) {
  const totalSecs = hEnd - hStart;
  const segs = [];
  let cursor = hStart;
  for (const [s,e] of phases) {
    if (s > cursor+0.5) segs.push({type:'oop',start:cursor,end:s,dur:s-cursor});
    segs.push({type:'bip',start:s,end:e,dur:e-s});
    cursor = e;
  }
  if (cursor < hEnd-0.5) segs.push({type:'oop',start:cursor,end:hEnd,dur:hEnd-cursor});

  const bars = segs.map(seg => {
    const pct = (seg.dur/totalSecs*100).toFixed(3);
    const tipClass = seg.type==='bip'?'bip-tip':'oop-tip';
    const tipText = seg.type==='bip' ? `BIP: ${fmtMSS(seg.dur)} (${fmtS(seg.dur)})` : `Rest: ${fmtMSS(seg.dur)} (${fmtS(seg.dur)})`;
    return `<div class="continuum-seg ${seg.type}" style="width:${pct}%" data-tip="${tipText}" data-tipclass="${tipClass}"></div>`;
  }).join('');

  const ticks = [];
  const tickEvery = totalSecs > 2400 ? 600 : 300;
  for (let t=0; t<=totalSecs; t+=tickEvery) {
    const pct = (t/totalSecs*100).toFixed(1);
    const abs = hStart+t;
    ticks.push(`<span class="tick" style="left:${pct}%">${Math.floor(abs/60)}:${Math.round(abs%60).toString().padStart(2,'0')}</span>`);
  }

  // filter events to show on this continuum
  const visEvents = showAllEvents
    ? (events||[])
    : (events||[]).filter(e=>e.type==='try');

  // group overlapping events by time bucket (5s) to stack them
  const bucketMap = {};
  visEvents.forEach(ev => {
    const rel = ev.time - hStart;
    if (rel < 0 || rel > totalSecs) return;
    const bucket = Math.round(rel/5)*5;
    if (!bucketMap[bucket]) bucketMap[bucket] = [];
    bucketMap[bucket].push(ev);
  });

  const markerRows = Object.entries(bucketMap).map(([bucket, evs]) => {
    const pct = (parseFloat(bucket)/totalSecs*100).toFixed(3);
    const etypes = evs.map(ev => {
      const colour = ev.team ? teamColour(ev.team, teamNames) : '#888';
      const gameMin = fmtMSS(ev.time - hStart);
      const tip = `${ev.type} — ${ev.team||'?'} (${gameMin} into half)`;
      return `<div class="event-marker" data-etype="${ev.type}" style="display:flex"><div data-tip="${tip}" data-tipclass="event-tip" class="continuum-seg" style="height:auto;display:flex;cursor:default">${iconForEvent(ev.type, colour, 16)}</div></div>`;
    }).join('');
    return `<div style="position:absolute;left:${pct}%;top:0;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:1px;z-index:10">
      <div style="display:flex;gap:1px;align-items:flex-end">${etypes}</div>
      <div style="width:1.5px;height:6px;background:var(--border2);opacity:0.8"></div>
    </div>`;
  }).join('');

  const markerHeight = Object.keys(bucketMap).length > 0 ? 30 : 0;

  return `<div class="continuum-half">
    <div class="continuum-half-label"><span>${label}</span><span>${fmtMSS(hEnd-hStart)}</span></div>
    ${markerHeight ? `<div style="position:relative;height:${markerHeight}px;margin-bottom:3px">${markerRows}</div>` : ''}
    <div class="continuum-bar">${bars}</div>
    <div class="tick-row">${ticks.join('')}</div>
  </div>`;
}

function tryLegend(teamNames) {
  if (!teamNames.length) return '';
  const items = teamNames.map(t =>
    `<span class="legend-item">${rugbyBallSVG(teamColour(t,teamNames),13)} ${t}</span>`
  ).join('');
  return `<div class="legend-strip" style="border-top:1px solid var(--border);margin-top:10px;padding-top:10px">
    <span style="font-size:10px;color:var(--muted);font-family:var(--font-mono)">TRIES:</span>${items}
  </div>`;
}

function freqTable(title, type, bands, h1freq, h2freq) {
  const isGreen = type==='bip';
  const maxH1=Math.max(...Object.values(h1freq),1), maxH2=Math.max(...Object.values(h2freq),1);
  const rows = bands.map(b => {
    const h1_=h1freq[b]||0, h2_=h2freq[b]||0;
    return `<tr>
      <td style="color:var(--text)">${b}</td>
      <td><div class="bar-cell"><div class="mini-bar ${isGreen?'green':'red'}" style="width:${Math.round(h1_/maxH1*55)}px"></div>${h1_}</div></td>
      <td><div class="bar-cell"><div class="mini-bar ${isGreen?'green':'red'}" style="width:${Math.round(h2_/maxH2*55)}px"></div>${h2_}</div></td>
    </tr>`;
  }).join('');
  return `<div class="freq-table-wrap">
    <div class="freq-table-head ${isGreen?'bip-head':'oop-head'}">
      <span class="freq-dot ${isGreen?'green':'red'}"></span>${title}
    </div>
    <table><thead><tr><th>Band</th><th>H1</th><th>H2</th></tr></thead><tbody>${rows}</tbody></table>
  </div>`;
}

function peakCard(title, win, h1off, h2off) {
  const off = win.half==='H1'?h1off:h2off;
  return `<div class="peak-card">
    <div class="peak-label">${title}</div>
    <div class="peak-pct">${win.pct.toFixed(1)}%</div>
    <div class="peak-detail">${win.half} · ${fmtMSS(win.start-off)} – ${fmtMSS(win.end-off)} into half</div>
  </div>`;
}

// ── Tooltips (delegated — single listener, no stacking) ──────────
(function() {
  const tip = document.getElementById('tooltip');
  document.addEventListener('mouseover', e => {
    const el = e.target.closest('[data-tip]');
    if (!el) return;
    tip.textContent = el.dataset.tip;
    tip.className = 'tooltip ' + (el.dataset.tipclass || '');
    tip.style.display = 'block';
  });
  document.addEventListener('mousemove', e => {
    if (tip.style.display === 'block') {
      tip.style.left = (e.clientX + 14) + 'px';
      tip.style.top  = (e.clientY - 30) + 'px';
    }
  });
  document.addEventListener('mouseout', e => {
    if (e.target.closest('[data-tip]') && !e.relatedTarget?.closest('[data-tip]'))
      tip.style.display = 'none';
  });
})();
function attachTooltips() {} // no-op: tooltips now delegated globally


// ══════════════════════════════════════════════════════════════════
// PAGE 4: Cross-game Summary
// ══════════════════════════════════════════════════════════════════
// ── Summary state ────────────────────────────────────────────────
let summaryGameOrder = [];   // array of game names in display order
let summarySortCol   = null; // which column is sorted
let summarySortDir   = -1;   // -1 = high→low, 1 = low→high

function syncSummaryOrder() {
  const names = Object.keys(games);
  summaryGameOrder = summaryGameOrder.filter(n => games[n]);
  names.forEach(n => { if (!summaryGameOrder.includes(n)) summaryGameOrder.push(n); });
}
function summaryDragStart(e, name) {
  e.dataTransfer.setData('text/plain', name);
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.classList.add('drag-active');
}
function summaryDragEnd(e) { e.currentTarget.classList.remove('drag-active','drag-over'); }
function summaryDragOver(e, name) {
  e.preventDefault(); e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.summary-drag-item').forEach(el => el.classList.remove('drag-over'));
  const el = document.querySelector(`.summary-drag-item[data-name="${CSS.escape(name)}"]`);
  if (el) el.classList.add('drag-over');
}
function summaryDrop(e, targetName) {
  e.preventDefault();
  document.querySelectorAll('.summary-drag-item').forEach(el => el.classList.remove('drag-over','drag-active'));
  const srcName = e.dataTransfer.getData('text/plain');
  if (!srcName || srcName === targetName) return;
  const si = summaryGameOrder.indexOf(srcName);
  const ti = summaryGameOrder.indexOf(targetName);
  if (si < 0 || ti < 0) return;
  summaryGameOrder.splice(si, 1);
  summaryGameOrder.splice(ti, 0, srcName);
  renderSummary();
}
function summarySort(col) {
  if (summarySortCol === col) summarySortDir *= -1;
  else { summarySortCol = col; summarySortDir = -1; }
  renderSummary();
}

const GAME_PALETTE = [
  '#22c55e','#818cf8','#f59e0b','#f472b6','#34d399',
  '#fb923c','#60a5fa','#a78bfa','#facc15','#2dd4bf',
];
function gameColour(idx) { return GAME_PALETTE[idx % GAME_PALETTE.length]; }

function renderSummary() {
  const container = document.getElementById('dash-summary');
  if (!container) return;
  syncSummaryOrder();
  const gameNames = summaryGameOrder.filter(n => games[n]);

  if (gameNames.length === 0) {
    container.innerHTML = `
      <div class="game-title">Cross-game Summary</div>
      <div class="game-subtitle">Compare physical demand metrics across multiple matches</div>
      <div class="summary-no-data" style="margin-top:32px">
        No games loaded — upload Sportscode XML files using the sidebar to begin.
      </div>`;
    return;
  }

  // ── Build per-game dataset (ordered by summaryGameOrder) ─────────
  const data = gameNames.map((n, idx) => {
    const g = games[n];
    const totalBip = g.h1.total + g.h2.total;
    const totalDur = g.h1.halfDur + g.h2.halfDur;
    const allDurs  = [...g.h1.durs, ...g.h2.durs];
    const tp = allDurs.length || 1;
    const b0_30   = allDurs.filter(d=>d<=30).length;
    const b30_60  = allDurs.filter(d=>d>30&&d<=60).length;
    const b60_90  = allDurs.filter(d=>d>60&&d<=90).length;
    const b90_120 = allDurs.filter(d=>d>90&&d<=120).length;
    const b120p   = allDurs.filter(d=>d>120).length;
    const longCount = b60_90 + b90_120 + b120p;
    // Colour is tied to stable position in summaryGameOrder (not sort order)
    return {
      name: n,
      colour: gameColour(summaryGameOrder.indexOf(n)),
      isActive: n === activeGame,
      short: n.length > 18 ? n.slice(0,16)+'…' : n,
      bipPct:    totalBip / totalDur * 100,
      h1pct:     g.h1.pct,
      h2pct:     g.h2.pct,
      totalBip, totalDur,
      best10pct: g.best10.pct,
      best20pct: g.best20.pct,
      totalPhases: tp,
      longCount,
      longPct:   longCount / tp * 100,
      b0_30, b30_60, b60_90, b90_120, b120p,
      avgPhase:  totalBip / tp,
      avgOOP:    g.allOop.length ? g.allOop.reduce((a,o)=>a+o[2],0)/g.allOop.length : 0,
    };
  });

  const n = data.length;

  // ── SVG axis label helper ─────────────────────────────────────
  function axisLabel(d, cx, baseY) {
    const words = d.short.replace(/_/g,' ').split(/\s+/);
    if (words.length <= 2)
      return `<text x="${cx}" y="${baseY+4}" text-anchor="middle" class="chart-label">${d.short}</text>`;
    const mid = Math.ceil(words.length/2);
    return `<text x="${cx}" y="${baseY}" text-anchor="middle" class="chart-label">${words.slice(0,mid).join(' ')}</text>
            <text x="${cx}" y="${baseY+13}" text-anchor="middle" class="chart-label">${words.slice(mid).join(' ')}</text>`;
  }

  // ── CHART 1: BIP % trend (line + dots) ───────────────────────
  function bipTrendChart() {
    const W=860, H=240, mL=48, mR=20, mT=24, mB=60;
    const pW=W-mL-mR, pH=H-mT-mB;
    const allVals = data.flatMap(d=>[d.bipPct,d.h1pct,d.h2pct]);
    const yMin = Math.max(0, Math.floor(Math.min(...allVals)/5)*5 - 5);
    const yMax = Math.min(100, Math.ceil(Math.max(...allVals)/5)*5 + 5);
    const yRange = yMax - yMin;
    const xOf = i => mL + (n===1 ? pW/2 : i/(n-1)*pW);
    const yOf = v => mT + pH - (v-yMin)/yRange*pH;
    const grids = Array.from({length:7},(_,i) => {
      const v = yMin + yRange*i/6, y = yOf(v);
      return `<line x1="${mL}" x2="${W-mR}" y1="${y.toFixed(1)}" y2="${y.toFixed(1)}" class="chart-grid"/>
              <text x="${mL-6}" y="${(y+3.5).toFixed(1)}" text-anchor="end" class="chart-label">${v.toFixed(0)}%</text>`;
    }).join('');
    const SERIES = [
      {key:'bipPct',col:'#22c55e',dash:'',  r:5},
      {key:'h1pct', col:'#60a5fa',dash:'5,3',r:4},
      {key:'h2pct', col:'#f472b6',dash:'2,3',r:4},
    ];
    const lines = SERIES.map(s => {
      if (n===1) return '';
      const pts = data.map((d,i)=>`${xOf(i).toFixed(1)},${yOf(d[s.key]).toFixed(1)}`).join(' ');
      return `<polyline points="${pts}" fill="none" stroke="${s.col}" stroke-width="${s.r===5?2:1.5}" stroke-dasharray="${s.dash}" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>`;
    }).join('');
    const dots = SERIES.flatMap(s => data.map((d,i) => {
      const cx=xOf(i).toFixed(1), cy=yOf(d[s.key]).toFixed(1);
      return `<circle cx="${cx}" cy="${cy}" r="${s.r}" fill="${s.col}" stroke="var(--bg)" stroke-width="1.5"
                data-tip="${d.name} · ${s.key==='bipPct'?'Full':s.key==='h1pct'?'H1':'H2'}: ${d[s.key].toFixed(1)}%" data-tipclass="bip-tip" style="cursor:pointer"/>
              <text x="${cx}" y="${(parseFloat(cy)-s.r-3).toFixed(1)}" text-anchor="middle" class="chart-val" style="font-size:9px">${d[s.key].toFixed(1)}%</text>`;
    })).join('');
    const xLabels = data.map((d,i)=>axisLabel(d,xOf(i),mT+pH+16)).join('');
    const activeMarkers = data.map((d,i)=>d.isActive?`<line x1="${xOf(i)}" y1="${mT}" x2="${xOf(i)}" y2="${mT+pH}" stroke="var(--accent)" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>`:'').join('');
    const yLbl = `<text x="11" y="${(mT+pH/2).toFixed(0)}" text-anchor="middle" transform="rotate(-90,11,${(mT+pH/2).toFixed(0)})" class="chart-label">BIP %</text>`;
    const axes = `<line x1="${mL}" y1="${mT}" x2="${mL}" y2="${mT+pH}" class="chart-axis"/>
                  <line x1="${mL}" y1="${mT+pH}" x2="${W-mR}" y2="${mT+pH}" class="chart-axis"/>`;
    return `<svg class="chart-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${yLbl}${grids}${axes}${activeMarkers}${lines}${dots}${xLabels}</svg>`;
  }

  // ── CHART 2: Peak demand — horizontal bars ────────────────────
  function peakDemandChart() {
    const W=860, H=Math.max(160,n*52+60), mL=20, mR=60, mT=20, mB=20;
    const pW=W-mL-mR, pH=H-mT-mB;
    const vals = data.map(d=>d.best10pct);
    const vMax = Math.min(100, Math.ceil(Math.max(...vals)/5)*5+5);
    const grids = Array.from({length:6},(_,i)=>{
      const v=vMax*i/5, x=mL+(v/vMax)*pW;
      return `<line x1="${x.toFixed(1)}" y1="${mT}" x2="${x.toFixed(1)}" y2="${mT+pH}" class="chart-grid"/>
              <text x="${x.toFixed(1)}" y="${mT-5}" text-anchor="middle" class="chart-label">${v.toFixed(0)}%</text>`;
    }).join('');
    const rowH=pH/n, barH=Math.min(28,rowH*0.62);
    const bars = data.map((d,i)=>{
      const cy=mT+i*rowH+rowH/2;
      const bw=Math.max(2,(d.best10pct/vMax)*pW);
      const isHigh=d.best10pct===Math.max(...vals);
      return `<rect x="${mL}" y="${(cy-barH/2).toFixed(1)}" width="${bw.toFixed(1)}" height="${barH.toFixed(1)}" fill="${d.colour}" rx="3" opacity="${d.isActive?1:0.75}"
                data-tip="${d.name} · Peak 10min: ${d.best10pct.toFixed(1)}%" data-tipclass="bip-tip" style="cursor:pointer"/>
              ${isHigh?`<text x="${(mL+bw+5).toFixed(1)}" y="${(cy+4).toFixed(1)}" class="chart-val" style="fill:#f59e0b;font-size:10px">▲ ${d.best10pct.toFixed(1)}%</text>`
                      :`<text x="${(mL+bw+5).toFixed(1)}" y="${(cy+4).toFixed(1)}" class="chart-val" style="fill:var(--muted)">${d.best10pct.toFixed(1)}%</text>`}
              <text x="${(mL-6).toFixed(1)}" y="${(cy+4).toFixed(1)}" text-anchor="end" class="chart-label" style="font-size:9px">${d.short}</text>
              ${d.isActive?`<rect x="${(mL-1).toFixed(1)}" y="${(cy-barH/2-1).toFixed(1)}" width="${(bw+2).toFixed(1)}" height="${(barH+2).toFixed(1)}" fill="none" stroke="var(--accent)" stroke-width="1.5" rx="3"/>`:''}`;
    }).join('');
    const dots20 = data.map((d,i)=>{
      const cy=mT+i*rowH+rowH/2, x=mL+(Math.min(d.best20pct,vMax)/vMax)*pW;
      return `<circle cx="${x.toFixed(1)}" cy="${cy}" r="4" fill="none" stroke="#818cf8" stroke-width="1.5"
                data-tip="${d.name} · Peak 20min: ${d.best20pct.toFixed(1)}%" data-tipclass="event-tip" style="cursor:pointer"/>`;
    }).join('');
    return `<svg class="chart-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
      ${grids}<line x1="${mL}" y1="${mT}" x2="${mL}" y2="${mT+pH}" class="chart-axis"/>${bars}${dots20}</svg>`;
  }

  // ── CHART 3: Long phase — single bar per game (>60s only) ─────
  function longPhaseChart() {
    const W=860, H=230, mL=48, mR=14, mT=24, mB=60;
    const pW=W-mL-mR, pH=H-mT-mB;
    const groupW=pW/n, bW=Math.min(52,Math.max(14,groupW-16));
    const allLong=data.map(d=>d.longPct);
    const yMax=Math.min(100,Math.ceil(Math.max(...allLong,5)/5)*5+10);
    const grids=Array.from({length:6},(_,i)=>{
      const v=yMax*i/5, y=mT+pH-(v/yMax)*pH;
      return `<line x1="${mL}" x2="${W-mR}" y1="${y.toFixed(1)}" y2="${y.toFixed(1)}" class="chart-grid"/>
              <text x="${mL-6}" y="${(y+3.5).toFixed(1)}" text-anchor="end" class="chart-label">${v.toFixed(0)}%</text>`;
    }).join('');
    const bars=data.map((d,i)=>{
      const cx=mL+i*groupW+groupW/2, bx=cx-bW/2;
      const v=d.longPct, bh=Math.max(2,(v/yMax)*pH), by=mT+pH-bh;
      return `<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${bW}" height="${bh.toFixed(1)}" fill="${d.colour}" rx="3"
                data-tip="${d.name} · Phases >60s: ${d.longCount} (${v.toFixed(1)}%)" data-tipclass="bip-tip" style="cursor:pointer"/>
              <text x="${(bx+bW/2).toFixed(1)}" y="${(by-4).toFixed(1)}" text-anchor="middle" class="chart-val">${v.toFixed(1)}%</text>
              <text x="${(bx+bW/2).toFixed(1)}" y="${(by-14).toFixed(1)}" text-anchor="middle" class="chart-label" style="font-size:9px">${d.longCount}ph</text>
              ${axisLabel(d,cx,mT+pH+16)}`;
    }).join('');
    const axes=`<line x1="${mL}" y1="${mT}" x2="${mL}" y2="${mT+pH}" class="chart-axis"/>
                <line x1="${mL}" y1="${mT+pH}" x2="${W-mR}" y2="${mT+pH}" class="chart-axis"/>`;
    const yLbl=`<text x="11" y="${(mT+pH/2).toFixed(0)}" text-anchor="middle" transform="rotate(-90,11,${(mT+pH/2).toFixed(0)})" class="chart-label">% of phases</text>`;
    return `<svg class="chart-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${yLbl}${grids}${axes}${bars}</svg>`;
  }

  // ── CHART 4: Stacked duration distribution ────────────────────
  function stackedDurationChart() {
    const W=860, H=240, mL=48, mR=130, mT=24, mB=60;
    const pW=W-mL-mR, pH=H-mT-mB;
    const groupW=pW/n, bW=Math.min(56,Math.max(18,groupW-14));
    const BANDS=[
      {key:'b0_30',  col:'#86efac',lbl:'0–30s'},
      {key:'b30_60', col:'#22c55e',lbl:'30–60s'},
      {key:'b60_90', col:'#16a34a',lbl:'60–90s'},
      {key:'b90_120',col:'#a16207',lbl:'90–120s'},
      {key:'b120p',  col:'#b91c1c',lbl:'>120s'},
    ];
    const grids=Array.from({length:6},(_,i)=>{
      const v=100*i/5, y=mT+pH-(v/100)*pH;
      return `<line x1="${mL}" x2="${W-mR}" y1="${y.toFixed(1)}" y2="${y.toFixed(1)}" class="chart-grid"/>
              <text x="${mL-6}" y="${(y+3.5).toFixed(1)}" text-anchor="end" class="chart-label">${v.toFixed(0)}%</text>`;
    }).join('');
    const bars=data.map((d,i)=>{
      const cx=mL+i*groupW+groupW/2, bx=cx-bW/2;
      let cum=0;
      const rects=BANDS.map(b=>{
        const pct=d[b.key]/d.totalPhases*100;
        if(pct<=0) return '';
        const bh=(pct/100)*pH, by=mT+pH-((cum+pct)/100)*pH;
        cum+=pct;
        return `<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${bW}" height="${bh.toFixed(1)}" fill="${b.col}" rx="1"
                  data-tip="${d.name} · ${b.lbl}: ${d[b.key]}ph (${pct.toFixed(1)}%)" data-tipclass="bip-tip" style="cursor:pointer"/>`;
      }).join('');
      return rects+`<text x="${(bx+bW/2).toFixed(1)}" y="${(mT+pH-(cum/100)*pH-4).toFixed(1)}" text-anchor="middle" class="chart-val" style="font-size:9px">${d.totalPhases}ph</text>
        ${axisLabel(d,cx,mT+pH+16)}`;
    }).join('');
    const axes=`<line x1="${mL}" y1="${mT}" x2="${mL}" y2="${mT+pH}" class="chart-axis"/>
                <line x1="${mL}" y1="${mT+pH}" x2="${W-mR}" y2="${mT+pH}" class="chart-axis"/>`;
    const yLbl=`<text x="11" y="${(mT+pH/2).toFixed(0)}" text-anchor="middle" transform="rotate(-90,11,${(mT+pH/2).toFixed(0)})" class="chart-label">% of phases</text>`;
    const lx2=W-mR+12;
    const legend=BANDS.map((b,i)=>`<rect x="${lx2}" y="${mT+i*24}" width="10" height="10" fill="${b.col}" rx="2"/>
      <text x="${lx2+14}" y="${mT+i*24+9}" class="chart-label">${b.lbl}</text>`).join('');
    return `<svg class="chart-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${yLbl}${grids}${axes}${bars}${legend}</svg>`;
  }

  // ── KPI table (sortable) ──────────────────────────────────────
  const COLS = [
    {key:'bipPct',    label:'Full BIP%',   fmt:d=>`${d.bipPct.toFixed(1)}%`,    hi:true},
    {key:'h1pct',     label:'H1 BIP%',     fmt:d=>`${d.h1pct.toFixed(1)}%`,     hi:true},
    {key:'h2pct',     label:'H2 BIP%',     fmt:d=>`${d.h2pct.toFixed(1)}%`,     hi:true},
    {key:'totalBip',  label:'BIP time',    fmt:d=>fmtMSS(d.totalBip),           hi:true},
    {key:'totalPhases',label:'Phases',     fmt:d=>`${d.totalPhases}`,            hi:true},
    {key:'avgPhase',  label:'Avg phase',   fmt:d=>fmtS(d.avgPhase),             hi:true},
    {key:'avgOOP',    label:'Avg rest',    fmt:d=>fmtS(d.avgOOP),               hi:false},
    {key:'best10pct', label:'Peak 10min',  fmt:d=>`${d.best10pct.toFixed(1)}%`, hi:true},
    {key:'best20pct', label:'Peak 20min',  fmt:d=>`${d.best20pct.toFixed(1)}%`, hi:true},
    {key:'longPct',   label:'>60s phases', fmt:d=>`${d.longCount} (${d.longPct.toFixed(0)}%)`, hi:true},
  ];

  // Sort data for table (independent of chart order)
  let tableData = [...data];
  if (summarySortCol) {
    tableData.sort((a,b) => {
      const av=a[summarySortCol], bv=b[summarySortCol];
      return (bv-av)*summarySortDir;
    });
  }

  // Find best value per column (from full data, not sorted)
  function bestVal(key, hi) {
    const vals=data.map(d=>d[key]);
    return hi ? Math.max(...vals) : Math.min(...vals);
  }

  const thRow = COLS.map(c => {
    const isSorted = summarySortCol === c.key;
    const cls = `sortable${isSorted?(summarySortDir===-1?' sort-desc':' sort-asc'):''}`;
    return `<th class="${cls}" onclick="summarySort('${c.key}')">${c.label}</th>`;
  }).join('');

  const rows = tableData.map(d => {
    const dot=`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${d.colour};margin-right:6px"></span>`;
    const cells = COLS.map(c => {
      const best=bestVal(c.key, c.hi);
      const isBest = Math.abs(d[c.key]-best)<0.001;
      return `<td style="font-family:var(--font-mono)${isBest?';color:var(--green);font-weight:600':''}">${c.fmt(d)}</td>`;
    }).join('');
    return `<tr style="${d.isActive?'background:rgba(99,102,241,0.08)':''}">
      <td style="cursor:pointer;white-space:nowrap;min-width:130px" onclick="selectGame('${d.name.replace(/'/g,"\\'")}')">${dot}${d.name}</td>
      ${cells}
    </tr>`;
  }).join('');

  const kpiTable = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden">
      <div style="overflow-x:auto"><table>
        <thead><tr>
          <th style="text-align:left;cursor:default">Game</th>${thRow}
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      <div style="padding:8px 14px;border-top:1px solid var(--border);font-size:10px;color:var(--muted);font-family:var(--font-mono)">
        <span style="color:var(--green)">■</span> Green = best in column · Click header to sort · Click game name to open
      </div>
    </div>`;

  // ── Drag-and-drop game order strip ────────────────────────────
  const dragStrip = `
    <div class="summary-chart-wrap" style="margin-bottom:16px">
      <div class="summary-drag-strip">
        <span class="summary-drag-label">GAME ORDER ⠿</span>
        ${summaryGameOrder.filter(n=>games[n]).map(n => {
          const col = gameColour(summaryGameOrder.indexOf(n));
          const safe = n.replace(/"/g,'&quot;').replace(/'/g,"\\'");
          return `<div class="summary-drag-item" data-name="${n.replace(/"/g,'&quot;')}" draggable="true"
            ondragstart="summaryDragStart(event,'${safe}')"
            ondragend="summaryDragEnd(event)"
            ondragover="summaryDragOver(event,'${safe}')"
            ondrop="summaryDrop(event,'${safe}')">
            <span class="summary-drag-dot" style="background:${col}"></span>
            <span class="drag-grip">⠿⠿</span>
            <span>${n}</span>
          </div>`;
        }).join('')}
        <span style="font-size:10px;color:var(--muted);font-family:var(--font-mono);margin-left:auto">drag to reorder charts</span>
      </div>
    </div>`;

  const singleNote = n===1 ? `<div style="background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.25);border-radius:6px;padding:10px 14px;margin-bottom:16px;font-size:11px;color:var(--muted);font-family:var(--font-mono)">
    ℹ︎ Only one game loaded — trend chart shows a single point. Upload more XML files to compare.</div>` : '';

  container.innerHTML = `
    <div class="game-title">Cross-game Summary</div>
    <div class="game-subtitle">${n} game${n!==1?'s':''} loaded · Click column headers to sort · Drag games to reorder · Green = best value</div>

    ${singleNote}
    ${dragStrip}

    <div class="section"><div class="section-label">Key metrics — all games</div>${kpiTable}</div>

    <div class="section"><div class="section-label">Ball in play % — game by game</div>
      <div class="summary-chart-wrap">
        <div class="summary-chart-head"><span class="summary-chart-title">BIP % trend</span><span class="summary-chart-sub">Full game · H1 · H2 across all loaded matches in display order</span></div>
        <div class="summary-chart-body">${bipTrendChart()}</div>
        <div class="chart-legend">
          <span class="chart-legend-item"><span class="chart-legend-dot" style="background:#22c55e"></span>Full game</span>
          <span class="chart-legend-item"><span class="chart-legend-dot" style="background:#60a5fa"></span>H1</span>
          <span class="chart-legend-item"><span class="chart-legend-dot" style="background:#f472b6"></span>H2</span>
          <span class="chart-legend-item" style="margin-left:12px"><span style="display:inline-block;width:20px;height:2px;background:var(--accent);margin-right:6px;vertical-align:middle;opacity:0.5"></span>Active game</span>
        </div>
      </div>
    </div>

    <div class="section"><div class="section-label">Peak demand — most demanding window</div>
      <div class="summary-chart-wrap">
        <div class="summary-chart-head"><span class="summary-chart-title">Peak rolling BIP% per game</span><span class="summary-chart-sub">Bar = best 10-min window · Circle = best 20-min window</span></div>
        <div class="summary-chart-body" style="padding-left:100px">${peakDemandChart()}</div>
        <div class="chart-legend">
          <span class="chart-legend-item"><span class="chart-legend-dot"></span>Filled bar = Peak 10-min BIP%</span>
          <span class="chart-legend-item"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;border:1.5px solid #818cf8;margin-right:6px"></span>Circle = Peak 20-min BIP%</span>
        </div>
      </div>
    </div>

    <div class="section"><div class="section-label">Long BIP phases — phases >60s</div>
      <div class="summary-chart-wrap">
        <div class="summary-chart-head"><span class="summary-chart-title">Long phase occurrence rate</span><span class="summary-chart-sub">% of total BIP phases lasting >60s · value above bar = % · smaller label = phase count</span></div>
        <div class="summary-chart-body">${longPhaseChart()}</div>
        <div class="chart-legend">
          <span class="chart-legend-item">Each bar = % of all phases lasting &gt;60s — higher values = more sustained high-intensity demand on players</span>
        </div>
      </div>
    </div>

    <div class="section"><div class="section-label">BIP phase duration distribution — full breakdown</div>
      <div class="summary-chart-wrap">
        <div class="summary-chart-head"><span class="summary-chart-title">Stacked duration bands</span><span class="summary-chart-sub">100% stacked — proportion of phases per duration bucket · hover for detail</span></div>
        <div class="summary-chart-body">${stackedDurationChart()}</div>
        <div class="chart-legend">
          <span class="chart-legend-item"><span class="chart-legend-dot" style="background:#86efac"></span>0–30s</span>
          <span class="chart-legend-item"><span class="chart-legend-dot" style="background:#22c55e"></span>30–60s</span>
          <span class="chart-legend-item"><span class="chart-legend-dot" style="background:#16a34a"></span>60–90s</span>
          <span class="chart-legend-item"><span class="chart-legend-dot" style="background:#a16207"></span>90–120s</span>
          <span class="chart-legend-item"><span class="chart-legend-dot" style="background:#b91c1c"></span>&gt;120s</span>
        </div>
      </div>
    </div>`;

  attachTooltips();
}

function exportXLSX() {
  if (!activeGame) return;
  const g = games[activeGame];
  const wb = XLSX.utils.book_new();
  const ACTIONS = g.tallyKeys || ['carries','rucks','scrums','mauls','breakdowns'];

  const summaryRows = [
    ['BALL-IN-PLAY SUMMARY'],
    ['','BIP (mm:ss)','BIP %','Phases','Avg Phase (s)','Longest (mm:ss)'],
    ['First Half', fmtMSS(g.h1.total), g.h1.pct.toFixed(1)+'%', g.h1.n, g.h1.avg.toFixed(1), fmtMSS(g.h1.longest)],
    ['Second Half', fmtMSS(g.h2.total), g.h2.pct.toFixed(1)+'%', g.h2.n, g.h2.avg.toFixed(1), fmtMSS(g.h2.longest)],
    [],['PEAK WINDOWS'],['Window','Peak BIP %','Half','Start','End'],
    ['10 min', g.best10.pct.toFixed(1)+'%', g.best10.half, fmtMSS(g.best10.start-g.best10.offset), fmtMSS(g.best10.end-g.best10.offset)],
    ['20 min', g.best20.pct.toFixed(1)+'%', g.best20.half, fmtMSS(g.best20.start-g.best20.offset), fmtMSS(g.best20.end-g.best20.offset)],
  ];

  const tallyRows = [['TEAM TALLY — FIRST HALF']];
  const hdr = ['Action', ...g.teamNames.flatMap(t=>[t+' Count', t+' /min', t+' /BIP min'])];
  tallyRows.push(hdr);
  ACTIONS.forEach(act => {
    tallyRows.push([act, ...g.teamNames.flatMap(tn => {
      const n = g.h1Tally[tn]?.[act]||0;
      return [n, fmtPM(n,g.h1TotalMins), fmtPM(n,g.h1BipMins)];
    })]);
  });
  tallyRows.push([],['TEAM TALLY — SECOND HALF'], hdr);
  ACTIONS.forEach(act => {
    tallyRows.push([act, ...g.teamNames.flatMap(tn => {
      const n = g.h2Tally[tn]?.[act]||0;
      return [n, fmtPM(n,g.h2TotalMins), fmtPM(n,g.h2BipMins)];
    })]);
  });

  const eventRows = [['Type','Team','Half','Time into half','Absolute time'],
    ...g.events.map(e => {
      const inH1 = e.time <= g.h1Offset + g.h1.halfDur + (g.h2Offset-g.h1Offset-g.h1.halfDur)/2;
      return [e.type, e.team||'', inH1?'H1':'H2', fmtMSS(e.time-(inH1?g.h1Offset:g.h2Offset)), fmtMSS(e.time)];
    })];

  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summaryRows), 'Summary');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(tallyRows), 'Team Tally');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(eventRows), 'Event Log');
  XLSX.writeFile(wb, activeGame+'_analysis.xlsx');
}

// ── Event type toggles ────────────────────────────────────────────
function toggleEventType(type) {
  activeFilters[type] = !activeFilters[type];
  const btn = document.getElementById('tog-'+type);
  if (btn) btn.classList.toggle('off', !activeFilters[type]);
  applyFilters();
}

function applyFilters() {
  const continuum = document.getElementById('event-continuum');
  if (!continuum) return;
  continuum.querySelectorAll('.event-marker').forEach(el => {
    el.style.display = activeFilters[el.dataset.etype] === false ? 'none' : 'flex';
  });
}

// ── File handling ─────────────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', e => processFiles(e.target.files));
const uz = document.getElementById('uploadZone');
uz.addEventListener('dragover', e => { e.preventDefault(); uz.classList.add('drag'); });
uz.addEventListener('dragleave', () => uz.classList.remove('drag'));
uz.addEventListener('drop', e => { e.preventDefault(); uz.classList.remove('drag'); processFiles(e.dataTransfer.files); });

function processFiles(files) {
  Array.from(files).filter(f=>f.name.endsWith('.xml')).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const data = parseXML(e.target.result, file.name.replace(/\.xml$/i,''));
      addGame(data);
    };
    reader.readAsText(file);
  });
}
